name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "릴리즈 버전 (예: 0.1.0)"
        required: true

env:
  GH_TOKEN: ${{ secrets.MACHINE_USER_TOKEN }}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ env.GH_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: 버전 유효성 검사
        env:
          VERSION: ${{ inputs.version }}
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS=. read -r MA MI PA <<< "$CURRENT"
          ALLOWED="$((MA+1)).0.0 ${MA}.$((MI+1)).0 ${MA}.${MI}.$((PA+1))"
          for v in $ALLOWED; do
            if [ "$VERSION" = "$v" ]; then
              echo "OK: $CURRENT -> $VERSION"
              exit 0
            fi
          done
          echo "::error::유효하지 않은 버전 '$VERSION'. 현재 버전 $CURRENT 기준 허용값: $ALLOWED"
          exit 1

      - name: 버전 bump & 커밋 & 푸시 & 태그
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "riiid-www"
          git config user.email "www.dev@riiid.co"
          npm pkg set version="$VERSION"
          git commit -am "chore: release v$VERSION"
          git tag "v$VERSION"
          git push origin HEAD --tags

      - run: pnpm build

      - run: pnpm pack

      - name: GitHub Release 생성 (tarball 첨부)
        env:
          GH_TOKEN: ${{ env.GH_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            ./*.tgz \
            --title "v${{ inputs.version }}" \
            --generate-notes
