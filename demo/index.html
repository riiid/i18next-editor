<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>i18next-editor demo</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; background: #f6f7f9; color: #1a1a1a; }
      main { max-width: 720px; margin: 0 auto; padding: 48px 24px 120px; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; margin-top: 24px; }
      button.app { font-size: 14px; padding: 8px 14px; border-radius: 8px; border: 1px solid #d1d5db; background: #111827; color: #fff; cursor: pointer; }
      .row { display: flex; gap: 12px; align-items: center; margin-top: 16px; }
      select { padding: 6px 10px; border-radius: 8px; border: 1px solid #d1d5db; }
      .hint { font-size: 13px; color: #6b7280; line-height: 1.6; }
      code { background: #eef0f3; padding: 1px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
